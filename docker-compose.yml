version: "3.8"

services:
  faka:
    build: .
    container_name: tg-faka
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
    environment:
      - WEB_PORT=8001
      - DATABASE_PATH=/app/data/faka.db
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
